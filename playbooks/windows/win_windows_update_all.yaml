---
- name: win_windows_update_all
  hosts: all
  gather_facts: false
  tasks:
    - name: Create a Directory for logs
      ansible.windows.win_file:
        path: c:\temp
        state: directory

    - name: Search and install all available Windows Updates
      ansible.windows.win_updates:
        category_names: "*"
        reboot: false
        log_path: c:\temp\patching.txt
      register: update_result
      ignore_errors: true
      async: 3600
      poll: 30

    - name: Reboot if required
      ansible.windows.win_reboot:
        reboot_timeout: 600
      when:
        - update_result is not failed
        - update_result.reboot_required | default(false)

    - name: Report failed or timed out hosts
      debug:
        msg: "WARNING: Update failed or timed out on {{ inventory_hostname }} — check c:\\temp\\patching.txt"
      when: update_result is failed
