---
- name: Get Windows Version Info
  hosts: all
  gather_facts: false
  vars:
    report_file: "/tmp/windows_versions_{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}.csv"
  tasks:
    - name: Get ProductName
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion
        name: ProductName
      register: reg_productname

    - name: Get DisplayVersion
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion
        name: DisplayVersion
      register: reg_displayversion

    - name: Get CurrentBuildNumber
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion
        name: CurrentBuildNumber
      register: reg_buildnumber

    - name: Get UBR
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion
        name: UBR
      register: reg_ubr

    - name: Display Windows version
      debug:
        msg: >
          {{ inventory_hostname }} —
          {{ reg_productname.value }}
          {{ reg_displayversion.value }}
          (Build {{ reg_buildnumber.value }}.{{ reg_ubr.value }})

    - name: Save results to CSV on control node
      lineinfile:
        path: "{{ report_file }}"
        line: "{{ inventory_hostname }},{{ reg_productname.value }},{{ reg_displayversion.value }},{{ reg_buildnumber.value }}.{{ reg_ubr.value }}"
        create: true
      delegate_to: localhost
